  /* ── 反默认光标(全局强制) ── */

<body>

<div id="spirit-cursor"></div>

<div class="crt-overlay"></div>

<script>
/* ════════════════════════════════════════════════════════
   玻璃天空 · Sky Through Glass
   ════════════════════════════════════════════════════════ */

// ── 全局状态 ──
const STATE = {
  phase: 'intro',         // intro → pollution → cleansing → clean
  cleanAmount: 0,         // 0 = 完全蒙尘, 1 = 完全清澈
  targetClean: 0,
  lastInteraction: 0,
  cursor: { x: -100, y: -100, tx: -100, ty: -100, pressed: false },
  bubbles: [],
  waterDroplets: [],
  sunRays: [],
  glassDust: [],          // 蒙尘颗粒(待擦)
  ambientDrone: null,
  audioStarted: false,
  startTime: 0,
};

// ── 配色(Frutiger Aero) ──
const COLOR = {
  skyTop:    [125, 200, 230],   // 晴空蓝
  skyMid:    [180, 225, 215],   // 浅水绿
  skyBot:    [220, 235, 200],   // 雾绿
  sun:       [255, 245, 200],
  bubble:    [200, 235, 245],
  bubbleHi:  [255, 255, 255],
  glass:     [180, 210, 220],
  dust:      [40, 50, 65],
  vhsTint:   [120, 80, 140],
};

// ════════════════════════════════════════════════════════
// p5.js 实例 1 — 底层 Frutiger Aero(纯净天空+果冻气泡)
// ════════════════════════════════════════════════════════
const aeroSketch = (s) => {
  s.setup = () => {
    const c = s.createCanvas(window.innerWidth, window.innerHeight);
    c.id('aero-canvas');
    c.parent(document.body);
    s.pixelDensity(Math.min(window.devicePixelRatio, 2));

    // 初始化气泡(果冻玻璃珠)
    for (let i = 0; i < 22; i++) {
      STATE.bubbles.push({
        x: s.random(s.width),
        y: s.random(s.height),
        r: s.random(40, 130),
        vx: s.random(-0.15, 0.15),
        vy: s.random(-0.25, -0.08),
        seed: s.random(1000),
        hue: s.random([0, 1]),  // 0=蓝, 1=绿
        phase: s.random(s.TWO_PI),
      });
    }

    // 水珠(Frutiger Aero 标志性的水)
    for (let i = 0; i < 35; i++) {
      STATE.waterDroplets.push({
        x: s.random(s.width),
        y: s.random(s.height),
        r: s.random(4, 14),
        seed: s.random(1000),
        alpha: s.random(80, 180),
      });
    }

    // 阳光体积光柱
    for (let i = 0; i < 5; i++) {
      STATE.sunRays.push({
        x: s.width * 0.2 + s.random(-50, 50),
        angle: s.random(-0.3, -0.1),
        width: s.random(120, 250),
        alpha: s.random(15, 30),
        phase: s.random(s.TWO_PI),
      });
    }
  };

  s.windowResized = () => s.resizeCanvas(window.innerWidth, window.innerHeight);

  s.draw = () => {
    const t = s.frameCount * 0.005;
    s.drawSky();
    s.drawSunRays(t);
    s.drawBubbles(t);
    s.drawWaterDroplets(t);
  };

  // ── 天空渐变(纯净 Aero 蓝绿) ──
  s.drawSky = () => {
    for (let y = 0; y < s.height; y += 2) {
      const ratio = y / s.height;
      let r, g, b;
      if (ratio < 0.5) {
        const t = ratio * 2;
        r = s.lerp(COLOR.skyTop[0], COLOR.skyMid[0], t);
        g = s.lerp(COLOR.skyTop[1], COLOR.skyMid[1], t);
        b = s.lerp(COLOR.skyTop[2], COLOR.skyMid[2], t);
      } else {
        const t = (ratio - 0.5) * 2;
        r = s.lerp(COLOR.skyMid[0], COLOR.skyBot[0], t);
        g = s.lerp(COLOR.skyMid[1], COLOR.skyBot[1], t);
        b = s.lerp(COLOR.skyMid[2], COLOR.skyBot[2], t);
      }
      s.stroke(r, g, b);
      s.line(0, y, s.width, y);
    }

    // 太阳(右上角)
    const sx = s.width * 0.78, sy = s.height * 0.18;
    const sg = s.drawingContext.createRadialGradient(sx, sy, 0, sx, sy, 240);
    sg.addColorStop(0, 'rgba(255, 245, 200, 0.55)');
    sg.addColorStop(0.4, 'rgba(255, 230, 180, 0.18)');
    sg.addColorStop(1, 'rgba(255, 230, 180, 0)');
    s.drawingContext.fillStyle = sg;
    s.drawingContext.fillRect(0, 0, s.width, s.height);
  };

  // ── 体积阳光柱 ──
  s.drawSunRays = (t) => {
    s.drawingContext.save();
    s.drawingContext.globalCompositeOperation = 'screen';
    for (const ray of STATE.sunRays) {
      const flicker = 0.7 + 0.3 * Math.sin(t * 0.8 + ray.phase);
      s.drawingContext.fillStyle = `rgba(255, 240, 200, ${ray.alpha / 255 * flicker})`;
      s.drawingContext.beginPath();
      s.drawingContext.moveTo(ray.x, 0);
      s.drawingContext.lineTo(ray.x + ray.width * Math.cos(ray.angle), 0);
      s.drawingContext.lineTo(ray.x + s.width * 0.4 * Math.cos(ray.angle), s.height);
      s.drawingContext.lineTo(ray.x, s.height);
      s.drawingContext.closePath();
      s.drawingContext.fill();
    }
    s.drawingContext.restore();
  };

  // ── 果冻气泡(Frutiger Aero 标志物) ──
  s.drawBubbles = (t) => {
    s.drawingContext.save();
    for (const b of STATE.bubbles) {
      b.x += b.vx;
      b.y += b.vy;
      if (b.y < -b.r) { b.y = s.height + b.r; b.x = s.random(s.width); }
      if (b.x < -b.r) b.x = s.width + b.r;
      if (b.x > s.width + b.r) b.x = -b.r;

      // 果冻玻璃质感: 三层 — 外光晕 + 主体 + 高光
      const breath = 1 + 0.04 * Math.sin(t * 1.2 + b.phase);

      // 外光晕
      const grd = s.drawingContext.createRadialGradient(b.x, b.y, b.r * 0.3, b.x, b.y, b.r * 1.4 * breath);
      if (b.hue < 0.5) {
        grd.addColorStop(0, 'rgba(180, 230, 245, 0.3)');
        grd.addColorStop(0.6, 'rgba(180, 230, 245, 0.08)');
        grd.addColorStop(1, 'rgba(180, 230, 245, 0)');
      } else {
        grd.addColorStop(0, 'rgba(180, 240, 200, 0.3)');
        grd.addColorStop(0.6, 'rgba(180, 240, 200, 0.08)');
        grd.addColorStop(1, 'rgba(180, 240, 200, 0)');
      }
      s.drawingContext.fillStyle = grd;
      s.drawingContext.beginPath();
      s.drawingContext.arc(b.x, b.y, b.r * 1.4 * breath, 0, s.TWO_PI);
      s.drawingContext.fill();

      // 主体(半透明)
      s.drawingContext.fillStyle = b.hue < 0.5
        ? 'rgba(220, 240, 250, 0.18)'
        : 'rgba(220, 245, 225, 0.18)';
      s.drawingContext.beginPath();
      s.drawingContext.arc(b.x, b.y, b.r * 0.9 * breath, 0, s.TWO_PI);
      s.drawingContext.fill();

      // 描边
      s.drawingContext.strokeStyle = 'rgba(255, 255, 255, 0.45)';
      s.drawingContext.lineWidth = 1.2;
      s.drawingContext.beginPath();
      s.drawingContext.arc(b.x, b.y, b.r * 0.9 * breath, 0, s.TWO_PI);
      s.drawingContext.stroke();

      // 高光(球状反光 — Aero 标志)
      s.drawingContext.fillStyle = 'rgba(255, 255, 255, 0.85)';
      s.drawingContext.beginPath();
      s.drawingContext.ellipse(
        b.x - b.r * 0.35 * breath,
        b.y - b.r * 0.4 * breath,
        b.r * 0.18 * breath,
        b.r * 0.1 * breath,
        -0.5, 0, s.TWO_PI
      );
      s.drawingContext.fill();

      // 底部次高光
      s.drawingContext.fillStyle = 'rgba(255, 255, 255, 0.4)';
      s.drawingContext.beginPath();
      s.drawingContext.ellipse(
        b.x + b.r * 0.3 * breath,
        b.y + b.r * 0.35 * breath,
        b.r * 0.08 * breath,
        b.r * 0.04 * breath,
        0.3, 0, s.TWO_PI
      );
      s.drawingContext.fill();
    }
    s.drawingContext.restore();
  };

  // ── 水珠(玻璃上的小水滴) ──
  s.drawWaterDroplets = (t) => {
    s.drawingContext.save();
    for (const d of STATE.waterDroplets) {
      const wobble = Math.sin(t * 2 + d.seed) * 0.5;
      const r = d.r + wobble;

      const grd = s.drawingContext.createRadialGradient(
        d.x - r * 0.3, d.y - r * 0.3, r * 0.1,
        d.x, d.y, r
      );
      grd.addColorStop(0, `rgba(255, 255, 255, ${d.alpha / 255 * 0.95})`);
      grd.addColorStop(0.5, `rgba(220, 240, 250, ${d.alpha / 255 * 0.5})`);
      grd.addColorStop(1, `rgba(180, 220, 235, ${d.alpha / 255 * 0.15})`);
      s.drawingContext.fillStyle = grd;
      s.drawingContext.beginPath();
      s.drawingContext.arc(d.x, d.y, r, 0, s.TWO_PI);
      s.drawingContext.fill();

      // 高光
      s.drawingContext.fillStyle = 'rgba(255, 255, 255, 0.9)';
      s.drawingContext.beginPath();
      s.drawingContext.arc(d.x - r * 0.25, d.y - r * 0.3, r * 0.15, 0, s.TWO_PI);
      s.drawingContext.fill();
    }
    s.drawingContext.restore();
  };
};

new p5(aeroSketch);

// ════════════════════════════════════════════════════════
// p5.js 实例 2 — VHS mask(蒙尘层 + 擦拭交互)
// ════════════════════════════════════════════════════════
const vhsSketch = (s) => {
  // 蒙尘 mask 画布(用户拖拽后局部变透明)
  let maskGfx;

  s.setup = () => {
    const c = s.createCanvas(window.innerWidth, window.innerHeight);
    c.id('vhs-canvas');
    c.parent(document.body);
    s.pixelDensity(1);  // mask 不需要 retina,性能优先

    maskGfx = s.createGraphics(s.width, s.height);
    maskGfx.pixelDensity(1);
    paintFullMask();

    // 蒙尘颗粒(浮在 mask 上,被擦拭时一起被抹掉)
    for (let i = 0; i < 280; i++) {
      STATE.glassDust.push({
        x: s.random(s.width),
        y: s.random(s.height),
        r: s.random(1.5, 4),
        seed: s.random(1000),
        baseAlpha: s.random(80, 180),
      });
    }

    // 事件绑定
    setupInteraction();
  };

  s.windowResized = () => {
    s.resizeCanvas(window.innerWidth, window.innerHeight);
    maskGfx.resizeCanvas(s.width, s.height);
    paintFullMask();
  };

  // ── 初始 mask: 完全蒙尘 ──
  function paintFullMask() {
    // 1) 暖灰雾底(老式电视雪花底)
    maskGfx.noStroke();
    for (let y = 0; y < maskGfx.height; y += 2) {
      const n = s.noise(y * 0.04) * 20;
      maskGfx.fill(190 + n, 180 + n, 175 + n, 245);
      maskGfx.rect(0, y, maskGfx.width, 2);
    }
    // 2) 大量 VHS 颗粒噪点(初始充满)
    for (let i = 0; i < 8000; i++) {
      const x = s.random(maskGfx.width);
      const y = s.random(maskGfx.height);
      const a = s.random(30, 110);
      const c = s.random([0, 1]) < 0.5 ? 255 : 30;
      maskGfx.fill(c, c, c, a);
      maskGfx.rect(x, y, 1.2, 1.2);
    }
  }

  // ── 绘制循环:VHS 颗粒 + 扫描线 + 蒙尘 + mask 合成 ──
  s.draw = () => {
    // 平滑清洁度
    STATE.cleanAmount += (STATE.targetClean - STATE.cleanAmount) * 0.025;

    // 污染强度:由阶段控制(幕一=0, 幕二/三=1, 幕四=0)
    const pollutionTarget = (STATE.phase === 'intro') ? 0
                         : (STATE.phase === 'clean') ? 0
                         : 1;
    STATE.pollutionAmount += (pollutionTarget - STATE.pollutionAmount) * 0.022;

    // 整体 VHS 蒙层
    s.drawingContext.save();
    s.drawingContext.globalCompositeOperation = 'source-over';

    // 基础暗化(蒙尘的灰度) — 幕一完全干净,幕二/三满蒙尘
    const dustAlpha = STATE.pollutionAmount * (1 - STATE.cleanAmount * 0.95);
    s.background(0, 0, 0, 0);
    s.drawingContext.fillStyle = `rgba(20, 25, 40, ${dustAlpha * 0.55})`;
    s.drawingContext.fillRect(0, 0, s.width, s.height);

    // 颗粒噪点(动态 — 像 VHS 雪花)
    s.drawingContext.globalCompositeOperation = 'screen';
    const grainCount = Math.floor(80 * STATE.pollutionAmount);
    for (let i = 0; i < grainCount; i++) {
      const x = s.random(s.width);
      const y = s.random(s.height);
      const a = s.random(40, 140) * (1 - STATE.cleanAmount * 0.85);
      const bright = s.random() < 0.3;
      s.drawingContext.fillStyle = bright
        ? `rgba(220, 230, 255, ${a/255})`
        : `rgba(60, 50, 70, ${a/255})`;
      s.drawingContext.fillRect(x, y, 1.5, 1.5);
    }

    // 扫描线(慢速漂移)
    s.drawingContext.globalCompositeOperation = 'multiply';
    const scanOffset = (s.frameCount * 0.3) % 6;
    for (let y = scanOffset; y < s.height; y += 3) {
      s.drawingContext.fillStyle = `rgba(0, 0, 0, ${0.18 * STATE.pollutionAmount * (1 - STATE.cleanAmount * 0.7)})`;
      s.drawingContext.fillRect(0, y, s.width, 1);
    }

    // 色散偏移(RGB split — 数字噪点的视觉签名)
    s.drawingContext.globalCompositeOperation = 'screen';
    const splitAmount = STATE.pollutionAmount * (1 - STATE.cleanAmount) * 4;
    s.drawingContext.fillStyle = `rgba(255, 80, 100, ${splitAmount * 0.012})`;
    s.drawingContext.fillRect(-splitAmount, 0, s.width, s.height);
    s.drawingContext.fillStyle = `rgba(80, 200, 255, ${splitAmount * 0.012})`;
    s.drawingContext.fillRect(splitAmount, 0, s.width, s.height);

    s.drawingContext.restore();

    // ── 蒙尘颗粒(玻璃上的污渍) — 按位置透明度绘制 ──
    // 离当前鼠标越近,透明度越低 = "被擦掉"
    s.drawingContext.save();
    for (const d of STATE.glassDust) {
      const dx = d.x - STATE.cursor.x;
      const dy = d.y - STATE.cursor.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const wipeRadius = STATE.cursor.pressed ? 90 : 60;
      const wipeStrength = Math.max(0, 1 - dist / wipeRadius);
      const visibleAlpha = d.baseAlpha * (1 - wipeStrength * 0.92);
      if (visibleAlpha < 5) continue;

      s.drawingContext.fillStyle = `rgba(40, 45, 60, ${visibleAlpha/255})`;
      s.drawingContext.beginPath();
      s.drawingContext.arc(d.x, d.y, d.r, 0, s.TWO_PI);
      s.drawingContext.fill();

      // 高光(让污渍有立体感)
      s.drawingContext.fillStyle = `rgba(255, 255, 255, ${visibleAlpha/255 * 0.3})`;
      s.drawingContext.beginPath();
      s.drawingContext.arc(d.x - d.r * 0.3, d.y - d.r * 0.3, d.r * 0.3, 0, s.TWO_PI);
      s.drawingContext.fill();
    }
    s.drawingContext.restore();

    // ── 擦拭轨迹(湿痕 — 像刚用布擦过的湿玻璃) ──
    // 关键改进:轨迹不是立即消失,而是 1.5 秒后逐渐蒸发(模拟水汽)
    s.drawingContext.save();
    s.drawingContext.globalCompositeOperation = 'lighter';
    const now = Date.now();
    if (STATE.wipeTrail.length > 1) {
      // 计算轨迹分段的不透明度(越老越淡)
      const segments = [];
      for (let i = 1; i < STATE.wipeTrail.length; i++) {
        const p = STATE.wipeTrail[i];
        const age = (now - p.t) / 1500; // 1.5s 完全淡出
        const alpha = Math.max(0, 1 - age);
        if (alpha > 0.05) segments.push({ x: p.x, y: p.y, alpha });
      }
      if (segments.length > 1) {
        // 外层(柔和光晕)
        s.drawingContext.strokeStyle = 'rgba(255, 250, 230, 0.12)';
        s.drawingContext.lineWidth = 42;
        s.drawingContext.lineCap = 'round';
        s.drawingContext.beginPath();
        s.drawingContext.moveTo(segments[0].x, segments[0].y);
        for (let i = 1; i < segments.length; i++) {
          s.drawingContext.lineTo(segments[i].x, segments[i].y);
        }
        s.drawingContext.stroke();

        // 内层(高光)
        s.drawingContext.strokeStyle = 'rgba(255, 255, 255, 0.22)';
        s.drawingContext.lineWidth = 20;
        s.drawingContext.stroke();
      }
    }
    s.drawingContext.restore();

    // 衰减过老的轨迹
    STATE.wipeTrail = STATE.wipeTrail.filter(p => (now - p.t) < 1500);

    // ── HUD 时间 + 信号 ──
    updateHUD();
  };

  // ── 交互:鼠标/触摸拖拽 → 擦拭 ──
  function setupInteraction() {
    STATE.wipeTrail = [];

    const handleMove = (x, y) => {
      STATE.cursor.tx = x;
      STATE.cursor.ty = y;
      STATE.cursor.moved = true;

      // 推入轨迹(带时间戳,用于湿痕蒸发动画)
      STATE.wipeTrail.push({ x, y, t: Date.now() });

      // 计算清洁增量 — 按速度 + 持续摩擦
      const prev = STATE.wipeTrail[STATE.wipeTrail.length - 2];
      if (prev) {
        const dx = x - prev.x;
        const dy = y - prev.y;
        const speed = Math.sqrt(dx*dx + dy*dy);
        // 真实擦玻璃:慢速摩擦比快速划擦更有效
        const efficiency = speed < 30 ? 1.3 : (speed > 120 ? 0.6 : 1.0);
        const inc = Math.min(0.012, speed * 0.0011 * efficiency);
        STATE.targetClean = Math.min(1, STATE.targetClean + inc);
      }

      // 触发音
      ensureAudio();
      if (STATE.audioStarted && Date.now() - STATE.lastChimeAt > 280) {
        playChime();
        STATE.lastChimeAt = Date.now();
      }

      // 阶段推进
      if (STATE.cleanAmount > 0.18 && STATE.phase === 'pollution') {
        advanceTo('cleansing');
      }
      if (STATE.cleanAmount > 0.88 && STATE.phase === 'cleansing') {
        advanceTo('clean');
      }
    };

    s.mouseMoved = () => {
      if (s.mouseX > 0 && s.mouseY > 0) handleMove(s.mouseX, s.mouseY);
    };
    s.touchMoved = () => {
      if (s.touches.length > 0) {
        handleMove(s.touches[0].x, s.touches[0].y);
        return false;
      }
    };
    s.mousePressed = () => {
      STATE.cursor.pressed = true;
      document.getElementById('spirit-cursor').classList.add('pressed');
    };
    s.mouseReleased = () => {
      STATE.cursor.pressed = false;
      document.getElementById('spirit-cursor').classList.remove('pressed');
    };
    s.touchStarted = () => {
      STATE.cursor.pressed = true;
      document.getElementById('spirit-cursor').classList.add('pressed');
      if (s.touches.length > 0) handleMove(s.touches[0].x, s.touches[0].y);
      return false;
    };
    s.touchEnded = () => {
      STATE.cursor.pressed = false;
      document.getElementById('spirit-cursor').classList.remove('pressed');
      return false;
    };

    // 全局 mousemove(光标位置用)
    document.addEventListener('mousemove', (e) => {
      STATE.cursor.tx = e.clientX;
      STATE.cursor.ty = e.clientY;
      if (!STATE.cursor.moved) {
        STATE.cursor.x = e.clientX;
        STATE.cursor.y = e.clientY;
        STATE.cursor.moved = true;
      }
    });
  }

  function updateHUD() {
    const elapsed = (Date.now() - STATE.startTime) / 1000;
    const hh = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const mm = String(Math.floor(elapsed / 60) % 60).padStart(2, '0');
    const ss = String(Math.floor(elapsed) % 60).padStart(2, '0');
    const hudTime = document.getElementById('hud-time');
    if (hudTime) hudTime.textContent = `CLIP: ${hh}:${mm}:${ss}`;

    const sig = document.getElementById('signal-strength');
    if (sig) {
      const bars = Math.round(STATE.cleanAmount * 10);
      sig.textContent = '▮'.repeat(bars) + '▯'.repeat(10 - bars);
    }
  }
};

new p5(vhsSketch);

// ════════════════════════════════════════════════════════
// 光标 lerp 跟随
// ════════════════════════════════════════════════════════
const cursorEl = document.getElementById('spirit-cursor');
function animateCursor() {
  STATE.cursor.x += (STATE.cursor.tx - STATE.cursor.x) * 0.18;
  STATE.cursor.y += (STATE.cursor.ty - STATE.cursor.y) * 0.18;
  cursorEl.style.transform = `translate(${STATE.cursor.x}px, ${STATE.cursor.y}px)`;
  requestAnimationFrame(animateCursor);
}
animateCursor();

// 显示光标(初始隐藏,首次移动才显示)
document.addEventListener('mousemove', () => {
  if (cursorEl.style.opacity !== '1') cursorEl.style.opacity = '1';
}, { once: false });

// ════════════════════════════════════════════════════════
// 叙事阶段控制
// ════════════════════════════════════════════════════════
function advanceTo(phase) {
  if (STATE.phase === phase) return;
  STATE.phase = phase;
  console.log('[sky-through-glass] phase →', phase);

  if (phase === 'intro') {
    // 幕一 · 纯净天空 — intro 文案先出
    document.getElementById('retro-hud').classList.add('visible');
    document.getElementById('intro-text').classList.add('visible');
  }

  if (phase === 'pollution') {
    // 幕二 · VHS 渗入 — 隐喻:数字噪音不请自来
    document.body.classList.add('vhs-active');
    document.getElementById('retro-brand').classList.add('visible');

    setTimeout(() => {
      document.getElementById('intro-text').classList.remove('visible');
    }, 1800);

    setTimeout(() => {
      const stage = document.getElementById('stage-text');
      stage.textContent = '什么时候起 · 天空蒙上了噪点';
      stage.classList.add('visible');
    }, 2400);

    setTimeout(() => {
      const stage = document.getElementById('stage-text');
      stage.textContent = '是信号不好 · 还是世界本来如此';
      stage.classList.add('visible');
    }, 7000);

    setTimeout(() => {
      const stage = document.getElementById('stage-text');
      stage.textContent = '用指腹 · 把玻璃擦一遍';
      stage.classList.add('visible');
      document.getElementById('hint-text').classList.add('visible');
    }, 11500);

    if (STATE.audioStarted) startNoiseDrone();
  }

  if (phase === 'cleansing') {
    // 幕三 · 用户亲手修复 — 隐喻:我为自己做了一件事
    const stage = document.getElementById('stage-text');
    stage.textContent = '一点一点 · 透出来了';
    stage.classList.add('visible');
    document.getElementById('hint-text').classList.remove('visible');
    if (STATE.audioStarted) fadeOutNoiseDrone();
  }

  if (phase === 'clean') {
    // 高潮 · 玻璃彻底清澈
    document.body.classList.add('vhs-fading');
    document.getElementById('crt-overlay').style.transition = 'opacity 2.5s';
    document.getElementById('crt-overlay').style.opacity = '0';
    document.getElementById('rgb-split-overlay').style.transition = 'opacity 2.5s';
    document.getElementById('rgb-split-overlay').style.opacity = '0';
    document.getElementById('retro-hud').style.transition = 'opacity 3s';
    document.getElementById('retro-hud').style.opacity = '0.25';

    setTimeout(() => {
      const stage = document.getElementById('stage-text');
      stage.innerHTML = '二〇〇五年的天空 · 还在这里';
      stage.classList.add('visible');
    }, 2200);

    setTimeout(() => {
      if (STATE.audioStarted) playChordBloom();
    }, 2400);
  }
}

// ════════════════════════════════════════════════════════
// 音频(疗愈向:底噪 → 风铃 → 和弦)
// ════════════════════════════════════════════════════════
let audioCtx = null;
let masterGain = null;
let noiseGain = null;
let droneOsc = null;

function ensureAudio() {
  if (STATE.audioStarted) return;
  STATE.audioStarted = true;
  STATE.lastChimeAt = 0;
  STATE.startTime = Date.now();

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.gain.setTargetAtTime(0.7, audioCtx.currentTime, 0.8);
  masterGain.connect(audioCtx.destination);
}

// 数字焦虑底噪(白噪 + 低频 drone)
function startNoiseDrone() {
  if (!audioCtx) return;

  // 白噪 buffer
  const bufferSize = audioCtx.sampleRate * 2;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.5;
  }
  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = noiseBuffer;
  noiseSrc.loop = true;

  // 低通滤波(避免刺耳)
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 400;
  lpf.Q.value = 0.5;

  noiseGain = audioCtx.createGain();
  noiseGain.gain.setTargetAtTime(0.04, audioCtx.currentTime, 1.2);

  noiseSrc.connect(lpf).connect(noiseGain).connect(masterGain);
  noiseSrc.start();

  // 低频 drone(174Hz 治愈频率)
  droneOsc = audioCtx.createOscillator();
  droneOsc.type = 'triangle';
  droneOsc.frequency.value = 174;
  const droneGain = audioCtx.createGain();
  droneGain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 2);
  droneOsc.connect(droneGain).connect(masterGain);
  droneOsc.start();
  STATE.droneGain = droneGain;
}

function fadeOutNoiseDrone() {
  if (!audioCtx) return;
  if (noiseGain) noiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1.5);
  if (STATE.droneGain) STATE.droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1.5);
  if (droneOsc) setTimeout(() => { try { droneOsc.stop(); } catch(e){} }, 4000);
}

// 风铃(五声音阶随机)
function playChime() {
  if (!audioCtx) return;
  // 五声音阶 C 大调 — C4, D4, E4, G4, A4
  const scale = [261.63, 293.66, 329.63, 392.00, 440.00];
  const freq = scale[Math.floor(Math.random() * scale.length)];

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;
  // 微弱 detune 让音色更柔
  osc.detune.value = (Math.random() - 0.5) * 8;

  const gain = audioCtx.createGain();
  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.08, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

  // 软混响(简单 delay)
  const delay = audioCtx.createDelay();
  delay.delayTime.value = 0.18;
  const fb = audioCtx.createGain();
  fb.gain.value = 0.3;
  delay.connect(fb).connect(delay);

  osc.connect(gain);
  gain.connect(delay);
  gain.connect(masterGain);

  osc.start(now);
  osc.stop(now + 1);
}

// 治愈和弦铺底(治愈态高潮)
function playChordBloom() {
  if (!audioCtx) return;
  // Cmaj7: C4 E4 G4 B4
  const chord = [261.63, 329.63, 392.00, 493.88];
  const now = audioCtx.currentTime;
  chord.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.detune.value = (Math.random() - 0.5) * 4;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.04, now + 0.6 + i * 0.1);
    gain.gain.linearRampToValueAtTime(0.02, now + 4);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 6);

    osc.connect(gain).connect(masterGain);
    osc.start(now);
    osc.stop(now + 6.5);
  });
}
